# Publishes specdrift to nuget.org via TRUSTED PUBLISHING — no stored secret: the
# workflow exchanges its GitHub OIDC token for a ~1h single-use key against this
# repository's Trusted Publishing policy on nuget.org. Tag v<version> (matching the
# csproj <Version>) on green main to release.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      image_ref:
        description: "Existing tag to (re)publish the container image for (e.g. v0.4.1)"
        required: true

jobs:
  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # the GitHub release
      id-token: write   # the OIDC token Trusted Publishing exchanges
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: gates
        run: |
          dotnet build specdrift.sln --nologo -c Release
          dotnet test specdrift.sln --no-build --nologo -c Release
      - name: pack
        run: dotnet pack src/Specdrift/Specdrift.csproj --nologo -c Release --no-build -o out
      # Login LAST-MINUTE: the exchanged key lives ~1 hour.
      - name: trusted-publishing login (OIDC -> temp key)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: omercelikdev   # the nuget.org PROFILE name the policy belongs to
      - name: push to nuget.org
        run: |
          dotnet nuget push "out/*.nupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
      - name: GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" --title "specdrift $version" --generate-notes \
            $(case "$version" in *-*) echo --prerelease;; esac)

  # The container face of the same release: ghcr.io/omercelikdev/specdrift — no secret
  # (GITHUB_TOKEN writes packages). Runs on every tag, and on dispatch for an existing tag.
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      # Dispatch backfills build from the DEFAULT branch (the Dockerfile may postdate the
      # tag; the sources are identical when nothing but docker infra landed since) and
      # only take the version LABEL from the input.
      - uses: actions/checkout@v4
      - name: version from the ref
        id: v
        run: |
          ref="${{ github.event_name == 'workflow_dispatch' && inputs.image_ref || github.ref_name }}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
      - name: ghcr login
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: build + push
        run: |
          image="ghcr.io/${{ github.repository }}"
          docker build -t "$image:${{ steps.v.outputs.version }}" -t "$image:latest" .
          docker push "$image:${{ steps.v.outputs.version }}"
          docker push "$image:latest"
